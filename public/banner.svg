<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#00f3ff;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="accentR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00f3ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="linkLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#00f3ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f3ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#00f3ff"/>
      <stop offset="100%" style="stop-color:#00f3ff;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00f3ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- HUD grid — primary color at very low opacity -->
  <g opacity="0.03" stroke="#00f3ff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Side ambient glow -->
  <rect x="0" y="0" width="350" height="400" fill="url(#accentL)"/>
  <rect x="850" y="0" width="350" height="400" fill="url(#accentR)"/>

  <!-- ── Left peer node ── -->
  <circle cx="230" cy="200" r="90" fill="url(#nodeGlow)"/>
  <circle cx="230" cy="200" r="52" fill="none" stroke="#00f3ff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="230" cy="200" r="44" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Node body: panel-dark bg with primary border -->
  <circle cx="230" cy="200" r="36" fill="#0a0a0a" stroke="#00f3ff" stroke-width="1.5"/>
  <!-- Browser icon -->
  <rect x="212" y="185" width="36" height="28" rx="3" fill="none" stroke="#00f3ff" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="212" y1="192" x2="248" y2="192" stroke="#00f3ff" stroke-width="1.5"/>
  <circle cx="217" cy="189" r="1.5" fill="#00f3ff" opacity="0.6"/>
  <circle cx="222" cy="189" r="1.5" fill="#00f3ff" opacity="0.6"/>
  <!-- Peer label -->
  <text x="230" y="258" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#00f3ff" opacity="0.7">Peer A</text>

  <!-- ── Right peer node ── -->
  <circle cx="970" cy="200" r="90" fill="url(#nodeGlow)"/>
  <circle cx="970" cy="200" r="52" fill="none" stroke="#00f3ff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="970" cy="200" r="44" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="970" cy="200" r="36" fill="#0a0a0a" stroke="#00f3ff" stroke-width="1.5"/>
  <rect x="952" y="185" width="36" height="28" rx="3" fill="none" stroke="#00f3ff" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="952" y1="192" x2="988" y2="192" stroke="#00f3ff" stroke-width="1.5"/>
  <circle cx="957" cy="189" r="1.5" fill="#00f3ff" opacity="0.6"/>
  <circle cx="962" cy="189" r="1.5" fill="#00f3ff" opacity="0.6"/>
  <text x="970" y="258" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#00f3ff" opacity="0.7">Peer B</text>

  <!-- ── Connection lines ── -->
  <!-- Main data line -->
  <line x1="266" y1="200" x2="934" y2="200" stroke="url(#linkLine)" stroke-width="1.5"/>
  <!-- Data packet dots -->
  <circle cx="420" cy="200" r="3" fill="#00f3ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="550" cy="200" r="3" fill="#00f3ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="600" cy="200" r="4" fill="#ffffff" filter="url(#glow)" opacity="0.5"/>
  <circle cx="650" cy="200" r="3" fill="#00f3ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="780" cy="200" r="3" fill="#00f3ff" filter="url(#glow)" opacity="0.9"/>

  <!-- Upper wave line -->
  <path d="M 266 178 Q 340 165 420 175 Q 500 185 580 170 Q 660 155 740 170 Q 820 185 900 175 Q 940 170 934 178"
        fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Lower wave line -->
  <path d="M 266 222 Q 340 235 420 225 Q 500 215 580 230 Q 660 245 740 230 Q 820 215 900 225 Q 940 230 934 222"
        fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.2" stroke-dasharray="4 3"/>

  <!-- ── Center signaling node ── -->
  <circle cx="600" cy="140" r="22" fill="#0d1117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="600" y="136" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#00f3ff" opacity="0.4">Signal</text>
  <text x="600" y="147" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#00f3ff" opacity="0.4">Server</text>
  <!-- Dotted lines to signaling server -->
  <line x1="266" y1="190" x2="580" y2="142" stroke="#1a1a1a" stroke-width="0.8" stroke-dasharray="3 4"/>
  <line x1="934" y1="190" x2="620" y2="142" stroke="#1a1a1a" stroke-width="0.8" stroke-dasharray="3 4"/>

  <!-- ── Title — Orbitron brand font ── -->
  <text x="600" y="310" text-anchor="middle"
        font-family="'Orbitron', 'system-ui', sans-serif"
        font-size="58" font-weight="700" letter-spacing="2"
        fill="url(#titleGrad)" filter="url(#titleGlow)">SPECTER-LINK</text>

  <!-- ── Tagline ── -->
  <text x="600" y="345" text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="11" font-weight="400" letter-spacing="4"
        fill="#fff" opacity="0.4">BROWSER-NATIVE  ·  PEER-TO-PEER  ·  NO ACCOUNTS</text>

  <!-- ── Feature pills ── -->
  <rect x="420" y="362" width="72" height="22" rx="0" fill="#0d1117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="456" y="377" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f3ff" opacity="0.6">video</text>

  <rect x="502" y="362" width="72" height="22" rx="0" fill="#0d1117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="538" y="377" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f3ff" opacity="0.6">audio</text>

  <rect x="584" y="362" width="88" height="22" rx="0" fill="#0d1117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="628" y="377" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f3ff" opacity="0.6">screen share</text>

  <rect x="682" y="362" width="60" height="22" rx="0" fill="#0d1117" stroke="#1a1a1a" stroke-width="1"/>
  <text x="712" y="377" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f3ff" opacity="0.6">chat</text>

  <!-- HUD corner accents -->
  <path d="M 0 0 L 40 0 L 0 40" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.4"/>
  <path d="M 1200 0 L 1160 0 L 1200 40" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.4"/>
  <path d="M 0 400 L 40 400 L 0 360" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.4"/>
  <path d="M 1200 400 L 1160 400 L 1200 360" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.4"/>
</svg>
