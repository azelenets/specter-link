pre-commit:
  parallel: true
  commands:
    lint:
      glob: "**/*.{ts,tsx,js,jsx}"
      run: npx eslint {staged_files}
    typecheck:
      glob: "**/*.{ts,tsx}"
      run: npm run typecheck
    test:
      glob: "**/*.{ts,tsx,js,jsx}"
      run: npx jest --findRelatedTests --passWithNoTests {staged_files}
